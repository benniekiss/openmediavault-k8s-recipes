# The app can be reached at https://zot.<FQDN>:8443
{% set hostname = 'zot.' ~ fqdn() %}
# Alternatively, use sslip.io if you don't have a local DNS server.
# The app can then be reached at https://zot.<IP>.sslip.io:8443
# {% set hostname = 'zot.' ~ ipaddr() ~ '.sslip.io' %}

# Insert the name of the shared folder you want to use. Make sure the
# configured UID/GID the container is running with has access to that
# directory.
{% set registrySharedFolderName = '<MODIFY>' %}
{% set sizeRegistryAssets = '30Gi' %}

# !!! Only modify the following manifest if you need to make custom changes. !!!
---
apiVersion: v1
kind: Namespace
metadata:
  name: zot-app
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: zot
  namespace: kube-system
  labels:
    app.kubernetes.io/name: zot
spec:
  repo: https://zotregistry.dev/helm-charts
  chart: project-zot/zot
  version: "latest"
  targetNamespace: zot-app
  valuesContent: |-
    # If persistence is 'true' the service uses a persistentVolumeClaim to mount a
    # volume for zot on '/var/lib/registry'; by default the pvc used is named
    # '$CHART_RELEASE-pvc', but the name can be changed below
    persistence: true
    # PVC data, only used if persistence is 'true'
    pvc:
      # When true, the StatefulSet uses volumeClaimTemplates to dynamically provision
      # PVCs. Kubernetes names the resulting PVCs as:
      #   <vctName>-<fullname>-<ordinal>
      # where <fullname> is the StatefulSet name (typically <release>-zot).
      # For example, with release "my-release" and default pvc.name:
      #   my-release-pvc-my-release-zot-0
      # When false, an existing PVC is mounted via volumes instead — set 'name' to the
      # exact name of the pre-existing PVC. Note: all replicas will share that single
      # PVC, so the access mode must support it (e.g. ReadWriteMany).
      create: false
      # When create is true, this is the volumeClaimTemplate name (the <vctName> part
      # above). When create is false, this is the literal name of a pre-existing PVC.
      # Defaults to '$CHART_RELEASE-pvc' if not set.
      name: zot-registry-data
      # Volume access mode, if using more than one replica we need
      accessModes: ["ReadWriteOnce"]
      # Size of the volume requested
      storage: {{ sizeRegistryAssets }}
      # Name of the storage class to use if it is different than the default one
      storageClassName: shared-folder
    configFiles:
      config.json: |-
        {
          "storage": { "rootDirectory": "/var/lib/registry" },
          "http": { "address": "0.0.0.0", "port": "5000" },
          "log": { "level": "debug" }
        }
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: zot-registry-data
  labels:
    app.kubernetes.io/name: zot
spec:
  storageClassName: shared-folder
  capacity:
    storage: {{ sizeRegistryAssets }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    # Insert the name of the shared folder you want to use.
    # Make sure the configured UID/GID the container is running
    # with has access to that directory.
    path: {{ sharedfolder_path(registrySharedFolderName) }}
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zot-registry-data
  namespace: zot-app
  labels:
    app.kubernetes.io/name: zot
spec:
  storageClassName: shared-folder
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ sizeRegistryAssets }}
  volumeName: zot-registry-data
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zot-websecure
  namespace: zot-app
  labels:
    app.kubernetes.io/name: zot
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ hostname }}`)
      kind: Rule
      services:
        - name: zot
          port: 5000
  tls: {}
